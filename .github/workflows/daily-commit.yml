name: Daily Commit

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 100

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Roll skip probability
        id: roll
        shell: bash
        run: |
          DAY=$(date -u +%u)
          RAND=$((RANDOM % 100))

          # 1=Monday, 6=Saturday, 7=Sunday
          if [ "$DAY" -eq 6 ]; then
            THRESHOLD=80
          elif [ "$DAY" -eq 7 ]; then
            THRESHOLD=60
          else
            THRESHOLD=10
          fi

          echo "UTC day: $DAY"
          echo "Random result: $RAND"
          echo "Skip threshold: $THRESHOLD"

          if [ "$RAND" -lt "$THRESHOLD" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping today's commit."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Proceeding with today's commit."
          fi

      - name: Add random delay
        if: steps.roll.outputs.skip == 'false'
        shell: bash
        run: |
          DELAY=$((RANDOM % 5400))
          echo "Waiting $DELAY seconds before committing."
          sleep "$DELAY"

      - name: Update daily ping
        if: steps.roll.outputs.skip == 'false'
        shell: bash
        run: |
          echo "Last automated update: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" \
            > _daily_ping.txt

      - name: Commit and push
        if: steps.roll.outputs.skip == 'false'
        shell: bash
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

          git add _daily_ping.txt

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: daily monitoring ping $(date -u +%Y-%m-%d)"

          for ATTEMPT in 1 2 3 4 5; do
            echo "Push attempt $ATTEMPT..."

            if git pull --rebase origin main && git push origin main; then
              echo "Daily commit pushed successfully."
              exit 0
            fi

            sleep $((ATTEMPT * 3))
          done

          echo "Failed to push after five attempts."
          exit 1
