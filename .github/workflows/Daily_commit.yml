name: Daily Commit

on:
  schedule:
    - cron: "0 14 * * *" # 10 AM ET during daylight saving time
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Roll skip probability
        id: roll
        shell: bash
        run: |
          DAY=$(date -u +%u) # 1=Monday ... 6=Saturday, 7=Sunday
          RAND=$((RANDOM % 100))

          if [ "$DAY" -eq 6 ]; then
            THRESHOLD=80
          elif [ "$DAY" -eq 7 ]; then
            THRESHOLD=60
          else
            THRESHOLD=10
          fi

          echo "Day: $DAY"
          echo "Random number: $RAND"
          echo "Skip threshold: $THRESHOLD"

          if [ "$RAND" -lt "$THRESHOLD" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Random delay
        if: steps.roll.outputs.skip == 'false'
        shell: bash
        run: |
          DELAY=$((RANDOM % 5400))
          echo "Waiting for $DELAY seconds..."
          sleep "$DELAY"

      - name: Update daily ping
        if: steps.roll.outputs.skip == 'false'
        shell: bash
        run: |
          echo "$(date -u +%Y-%m-%d)" > _daily_ping.txt

      - name: Commit and push
        if: steps.roll.outputs.skip == 'false'
        shell: bash
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

          git add _daily_ping.txt

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: daily ping $(date -u +%Y-%m-%d)"

          for i in 1 2 3 4 5; do
            if git pull --rebase origin "${GITHUB_REF_NAME}" && git push origin "${GITHUB_REF_NAME}"; then
              echo "Changes pushed successfully."
              exit 0
            fi

            echo "Push attempt $i failed. Retrying..."
            sleep $((i * 3))
          done

          echo "Failed to push changes after 5 attempts."
          exit 1
